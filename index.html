<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFitt AI - Premium Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; }
        .premium-title { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn { transition: all 0.3s; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-0 md:p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#061810] via-[#020617] to-[#02040a]">

    <div class="w-full max-w-md bg-[#040814] min-h-screen md:min-h-[850px] md:max-h-[900px] md:rounded-[42px] md:border-8 md:border-[#1e293b] shadow-[0_0_50px_rgba(16,185,129,0.1)] flex flex-col overflow-hidden relative">
        
        <header class="bg-[#02050d]/90 pt-4 pb-3 px-4 border-b border-emerald-950/20 sticky top-0 z-40 backdrop-blur-md">
            <div class="flex justify-between items-center mb-4 px-1">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-tr from-emerald-600 to-teal-400 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-900/30">
                        <i class="fa-solid fa-gem text-[#02050d] font-black text-xs"></i>
                    </div>
                    <span class="text-lg font-extrabold tracking-tight text-white">AuraFitt <span class="premium-title text-emerald-400 italic font-normal">AI</span></span>
                </div>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="switchTab('cadastro', this)" id="btn-cadastro" class="tab-btn flex-none flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500 text-slate-950 font-bold text-xs shadow-lg shadow-emerald-500/20 active">
                    <i class="fa-solid fa-user-gear"></i> <span>Meu Perfil</span>
                </button>
                <button onclick="switchTab('simulador', this)" id="btn-simulador" class="tab-btn flex-none flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900/80 border border-slate-800 text-slate-400 font-semibold text-xs">
                    <i class="fa-solid fa-magnifying-glass-chart"></i> <span>Simulador</span>
                </button>
                <button onclick="switchTab('dieta', this)" id="btn-dieta" class="tab-btn flex-none flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900/80 border border-slate-800 text-slate-400 font-semibold text-xs">
                    <i class="fa-solid fa-wheat-awn"></i> <span>Dieta</span>
                </button>
            </div>
        </header>

        <main class="flex-grow p-4 overflow-y-auto no-scrollbar">
            
            <!-- PERFIL -->
            <div id="tab-cadastro" class="tab-content active space-y-5">
                <div class="glass-panel p-4 rounded-2xl border border-emerald-500/10">
                    <h3 class="text-white font-extrabold text-base">Passo 1: Seus Dados</h3>
                    <p class="text-[11px] text-slate-400 mt-1">Preencha suas métricas.</p>
                </div>
                <input type="text" id="user-name" placeholder="Nome" class="w-full bg-[#080d1a] border border-slate-800 rounded-xl px-4 py-3 text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="user-weight" placeholder="Peso Atual (kg)" class="w-full bg-[#080d1a] border border-slate-800 rounded-xl px-4 py-3 text-sm">
                    <input type="number" id="user-target-weight" placeholder="Meta (kg)" class="w-full bg-[#080d1a] border border-slate-800 rounded-xl px-4 py-3 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" step="0.01" id="user-height" placeholder="Altura (m)" class="w-full bg-[#080d1a] border border-slate-800 rounded-xl px-4 py-3 text-sm">
                    <input type="number" id="user-age" placeholder="Idade" class="w-full bg-[#080d1a] border border-slate-800 rounded-xl px-4 py-3 text-sm">
                </div>
                <button onclick="calcularIMC()" class="w-full py-4 rounded-xl bg-slate-800 text-white font-bold text-xs uppercase tracking-widest border border-slate-700">Calcular IMC</button>
                <div id="imc-resultado" class="hidden p-4 bg-emerald-950/20 border border-emerald-500/20 rounded-xl text-center font-bold text-emerald-400"></div>
            </div>

            <!-- SIMULADOR -->
            <div id="tab-simulador" class="tab-content space-y-4">
                <div class="bg-slate-900/40 p-5 rounded-2xl text-center space-y-3 glass-panel">
                    <p class="text-xs font-bold text-white">Escolha o período:</p>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="selectMonth(1)" class="month-btn py-2 text-xs rounded-lg bg-slate-950 border border-slate-800">1 Mês</button>
                        <button onclick="selectMonth(2)" class="month-btn py-2 text-xs rounded-lg bg-slate-950 border border-slate-800">2 Meses</button>
                        <button onclick="selectMonth(3)" class="month-btn py-2 text-xs rounded-lg bg-slate-950 border border-slate-800">3 Meses</button>
                        <button onclick="selectMonth(4)" class="month-btn py-2 text-xs rounded-lg bg-slate-950 border border-slate-800">4 Meses</button>
                    </div>
                    <label for="foto-upload" class="block w-full py-4 border-2 border-dashed border-emerald-500/30 rounded-xl cursor-pointer text-xs font-bold text-emerald-400">
                        <i class="fa-solid fa-camera mr-2"></i> Anexar Foto
                        <input type="file" id="foto-upload" class="hidden" onchange="document.getElementById('file-name').innerText = this.files[0].name">
                    </label>
                    <p id="file-name" class="text-[10px] text-slate-500"></p>
                    <button onclick="gerarProjecao()" id="btn-sim" class="w-full py-4 rounded-xl bg-emerald-500 text-slate-950 font-bold text-xs uppercase">Gerar Projeção</button>
                    <div id="sim-result" class="hidden p-4 mt-4 bg-slate-950 rounded-xl border border-emerald-950/20"></div>
                </div>
            </div>

            <!-- DIETA -->
            <div id="tab-dieta" class="tab-content space-y-4">
                <p class="text-xs font-bold text-slate-400 uppercase">Quais refeições deseja montar?</p>
                <div class="flex gap-2">
                    <button class="meal-btn px-3 py-2 rounded-lg bg-slate-900 text-[10px] uppercase font-bold" onclick="this.classList.toggle('active')">Café da Manhã</button>
                    <button class="meal-btn px-3 py-2 rounded-lg bg-slate-900 text-[10px] uppercase font-bold" onclick="this.classList.toggle('active')">Almoço</button>
                    <button class="meal-btn px-3 py-2 rounded-lg bg-slate-900 text-[10px] uppercase font-bold" onclick="this.classList.toggle('active')">Jantar</button>
                </div>
                <textarea id="diet-ingredientes" class="w-full bg-[#080d1a] border border-slate-800 rounded-xl p-4 text-sm" placeholder="Seus ingredientes..."></textarea>
                <button onclick="gerarDieta()" id="btn-diet" class="w-full py-4 rounded-xl bg-emerald-500 text-slate-950 font-bold text-xs uppercase">Gerar Prato Proteico</button>
                <div id="diet-result" class="hidden p-4 bg-slate-900 rounded-xl text-xs text-slate-300"></div>
            </div>
        </main>
    </div>

    <script>
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function calcularIMC() {
            const p = parseFloat(document.getElementById('user-weight').value);
            const a = parseFloat(document.getElementById('user-height').value);
            const res = document.getElementById('imc-resultado');
            if (p && a) {
                const imc = (p / (a * a)).toFixed(1);
                document.getElementById('imc-valor').innerText = imc + " - " + (imc < 25 ? "Peso Normal" : "Obesidade");
                res.classList.remove('hidden');
            }
        }

        async function gerarProjecao() {
            const btn = document.getElementById('btn-sim');
            const res = document.getElementById('sim-result');
            btn.disabled = true;
            btn.innerText = "Processando...";
            try {
                const r = await fetch('/api', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ acao: 'gerar_projecao', meta: 80, meses: 3 })
                });
                const data = await r.json();
                res.innerHTML = `<img src="${data.imageUrl}" class="w-full rounded-lg">`;
                res.classList.remove('hidden');
            } catch(e) { res.innerText = "Erro: " + e.message; res.classList.remove('hidden'); }
            btn.innerText = "Gerar Projeção";
            btn.disabled = false;
        }

        async function gerarDieta() {
            const btn = document.getElementById('btn-diet');
            const res = document.getElementById('diet-result');
            const ing = document.getElementById('diet-ingredients').value;
            btn.disabled = true;
            try {
                const r = await fetch('/api', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ acao: 'gerar_dieta', ingredientes: ing, refeicoes: "Café, Almoço, Jantar" })
                });
                const data = await r.json();
                res.innerHTML = data.result;
                res.classList.remove('hidden');
            } catch(e) { res.innerText = "Erro: " + e.message; res.classList.remove('hidden'); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
