<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFitt AI - Premium Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f1f5f9; }
        .glass-panel { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .tab-active { background: linear-gradient(90deg, #34d399, #2dd4bf); color: #020617; }
    </style>
</head>
<body class="min-h-screen p-4 flex justify-center">
    <div class="w-full max-w-sm">
        <header class="mb-6">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center font-bold text-black">A</div>
                <h1 class="text-xl font-bold italic">AuraFitt <span class="text-emerald-400 not-italic">AI</span></h1>
            </div>
            <div class="grid grid-cols-3 gap-2 bg-[#0f172a] p-1 rounded-full">
                <button onclick="switchTab('perfil')" id="btn-perfil" class="tab-btn py-2 text-xs font-bold rounded-full tab-active">Perfil</button>
                <button onclick="switchTab('simulador')" id="btn-simulador" class="tab-btn py-2 text-xs font-bold rounded-full">Simulador</button>
                <button onclick="switchTab('proteina')" id="btn-proteina" class="tab-btn py-2 text-xs font-bold rounded-full">Proteína</button>
            </div>
        </header>

        <main id="content" class="glass-panel p-5 rounded-2xl">
            <!-- PÁGINA PERFIL -->
            <div id="tab-perfil" class="space-y-4">
                <h2 class="font-bold">Seus Dados de Calibração</h2>
                <input type="text" id="p-nome" placeholder="Nome" class="w-full bg-[#080d1a] border border-[#1c2438] p-3 rounded-xl text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="p-peso" placeholder="Peso (kg)" class="w-full bg-[#080d1a] border border-[#1c2438] p-3 rounded-xl text-sm">
                    <input type="number" id="p-meta" placeholder="Meta (kg)" class="w-full bg-[#080d1a] border border-[#1c2438] p-3 rounded-xl text-sm">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="p-altura" placeholder="Altura (m)" class="w-full bg-[#080d1a] border border-[#1c2438] p-3 rounded-xl text-sm">
                    <input type="number" id="p-idade" placeholder="Idade" class="w-full bg-[#080d1a] border border-[#1c2438] p-3 rounded-xl text-sm">
                </div>
                <input type="number" id="p-cintura" placeholder="Cintura (cm)" class="w-full bg-[#080d1a] border border-[#1c2438] p-3 rounded-xl text-sm">
                <button class="w-full bg-emerald-500 text-black py-3 rounded-xl font-bold text-sm">Calcular IMC</button>
            </div>

            <!-- PÁGINA SIMULADOR -->
            <div id="tab-simulador" class="hidden space-y-4">
                <h2 class="font-bold">Simulador Visual</h2>
                <div class="border-2 border-dashed border-slate-700 p-8 rounded-2xl text-center text-slate-500">Toque para selecionar foto</div>
                <div class="flex gap-2">
                    <button class="flex-1 py-2 rounded-lg bg-[#080d1a] text-xs font-bold">1 Mês</button>
                    <button class="flex-1 py-2 rounded-lg bg-[#080d1a] text-xs font-bold">2 Meses</button>
                    <button class="flex-1 py-2 rounded-lg bg-[#080d1a] text-xs font-bold">3 Meses</button>
                </div>
                <button class="w-full bg-emerald-500 text-black py-3 rounded-xl font-bold text-sm">Gerar Projeção com IA</button>
            </div>

            <!-- PÁGINA PROTEÍNA -->
            <div id="tab-proteina" class="hidden space-y-4">
                <h2 class="font-bold">Prato Proteico</h2>
                <p class="text-xs text-slate-400">Monte em segundos uma refeição com prioridade em proteínas.</p>
                <textarea class="w-full bg-[#080d1a] border border-[#1c2438] p-3 rounded-xl h-24 text-sm" placeholder="O que tem em casa hoje?"></textarea>
                <div class="grid grid-cols-3 gap-2">
                    <button class="py-2 rounded-lg bg-[#080d1a] text-[10px] font-bold">Café</button>
                    <button class="py-2 rounded-lg bg-[#080d1a] text-[10px] font-bold">Almoço</button>
                    <button class="py-2 rounded-lg bg-[#080d1a] text-[10px] font-bold">Jantar</button>
                </div>
                <button class="w-full bg-emerald-500 text-black py-3 rounded-xl font-bold text-sm">Gerar Prato Proteico</button>
            </div>
        </main>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('tab-active');
        }
    </script>
</body>
</html>
